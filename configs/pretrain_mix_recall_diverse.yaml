# Recall-cotrain mix (2026-06-30) — FEASIBILITY PROBE for the bounded-state
# recall thesis. Teach the lean LINEARIZED base to USE its recurrent state for
# long-range recall (lift scoreboard gen_acc off 0%) WITHOUT forgetting the
# inherited coding knowledge (HumanEval-solution CE near 0.759).
#
# = v18 anchor streams (real code + instruction + CVE + textbook + wiki + arXiv)
#   MINUS the four prose recall streams (they use a DIFFERENT format than the
#   scoreboard AND restate the answer = recency-leaky; training on them would not
#   teach the scoreboard-measured behavior — the documented format-artifact trap)
# PLUS one new recall stream that EXACTLY matches the scoreboard elicitation
#   (`print(vQ)  # VALUE`, value never restated -> genuine long-range recall),
#   weighted recall-heavy (~37% of tokens after renormalization).
#
# Anti-forgetting: the code/instruction anchor stays dominant (~50% raw weight of
# real code) so the trunk keeps its coding distribution while learning recall.

sources:

  # ==== Scoreboard-format RECALL (the recall gradient; ~37% of tokens) ========
  - name: recall_diverse_train
    jsonl_path: data/recall_diverse_train.jsonl
    text_field: text
    split: train
    weight: 0.50
    filter: always

  # ==== Raw code (the anti-forgetting bulk; from v18) =======================
  - name: codeparrot
    dataset_id: codeparrot/codeparrot-clean
    text_field: content
    split: train
    weight: 0.22
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 200 }

  - name: python_codes_25k
    dataset_id: flytech/python-codes-25k
    text_field: text
    split: train
    weight: 0.08
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  # ==== Problem-solving instruction code (from v18) =========================
  - name: magicoder_oss
    dataset_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    text_field: [problem, solution]
    split: train
    weight: 0.09
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: code_exercises_jinaai
    dataset_id: jinaai/code_exercises
    text_field: [problem, solution]
    split: train
    weight: 0.02
    fim_rate: 0.5
    filter: always

  - name: python_instr_18k_alpaca
    dataset_id: iamtarun/python_code_instructions_18k_alpaca
    text_field: [prompt, output]
    split: train
    weight: 0.06
    filter: always

  - name: codealpaca_20k
    dataset_id: HuggingFaceH4/CodeAlpaca_20K
    text_field: [prompt, completion]
    split: train
    weight: 0.05
    filter: always

  # ==== CVE / vulnerability + fix (from v18) ================================
  - name: bigvul
    dataset_id: bstee615/bigvul
    text_builder: bigvul
    split: train
    weight: 0.08
    filter: bigvul_vulnerable

  - name: cybernative_vuln_dpo
    dataset_id: CyberNative/Code_Vulnerability_Security_DPO
    text_builder: cybernative_dpo
    split: train
    weight: 0.04
    filter: always

  # ==== Synthetic CS textbooks (from v18) ===================================
  - name: textbooks_lite_sciphi
    dataset_id: SciPhi/textbooks-are-all-you-need-lite
    text_field: completion
    split: train
    weight: 0.04
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: textbook_quality_programming
    dataset_id: vikp/textbook_quality_programming
    text_field: markdown
    split: train
    weight: 0.04
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  # ==== Wikipedia + arXiv (general knowledge; from v18) =====================
  - name: wikipedia_en
    dataset_id: wikimedia/wikipedia
    hf_extra: { name: "20231101.en" }
    text_field: text
    split: train
    weight: 0.04
    filter:
      name: min_content_len
      args: { min_chars: 500 }

  - name: arxiv_fulltext
    dataset_id: AlgorithmicResearchGroup/arxiv_s2orc_parsed
    text_field: text
    split: train
    weight: 0.06
    filter:
      name: min_content_len
      args: { min_chars: 500 }

  - name: arxiv_abstracts
    dataset_id: librarian-bots/arxiv-metadata-snapshot
    text_field: [title, abstract]
    split: train
    weight: 0.02
    filter: always
