# Mixed-corpus pretrain v1 — sources for the 217 M super-coder run.
#
# All datasets here are ungated/open and were verified streamable via
# `datasets.load_dataset(..., streaming=True)` at YAML-write time.
# BigCode / fineweb-edu / RedPajama are intentionally excluded: gated or
# scripts-removed at this time. If you get access tokens later, drop the
# new sources here and re-run.
#
# Weights are *initial* and sum to 1.0; `MixedSourceStream` renormalises.

sources:

  # ---- Raw code (52 %) ----

  - name: codeparrot
    dataset_id: codeparrot/codeparrot-clean
    text_field: content
    split: train
    weight: 0.40
    filter:
      name: min_content_len
      args: { min_chars: 200 }

  - name: python_codes_25k
    dataset_id: flytech/python-codes-25k
    text_field: text
    split: train
    weight: 0.12
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  # ---- Problem-solving instruction code (28 %) — gives the model
  # "here is a task, here is a solution" structure even pre-SFT.

  - name: magicoder_oss
    dataset_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    text_field: [problem, solution]
    split: train
    weight: 0.10
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: code_exercises_jinaai
    dataset_id: jinaai/code_exercises
    text_field: [problem, solution]
    split: train
    weight: 0.06
    filter: always

  - name: python_instr_18k_alpaca
    dataset_id: iamtarun/python_code_instructions_18k_alpaca
    text_field: [prompt, output]
    split: train
    weight: 0.06
    filter: always

  - name: codealpaca_20k
    dataset_id: HuggingFaceH4/CodeAlpaca_20K
    text_field: [prompt, completion]
    split: train
    weight: 0.06
    filter: always

  # ---- Synthetic CS textbooks (12 %) — the closest open analogue to the
  # "textbook quality" data Phi-1 used; pretrained on this teaches the
  # model to *explain* code, not just continue it.

  - name: textbooks_lite_sciphi
    dataset_id: SciPhi/textbooks-are-all-you-need-lite
    text_field: completion
    split: train
    weight: 0.07
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: textbook_quality_programming
    dataset_id: vikp/textbook_quality_programming
    text_field: markdown
    split: train
    weight: 0.05
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  # ---- Wikipedia (8 %) — broad CS / math / algorithm prose. Will pick up
  # plenty of non-CS articles too; an acceptable distribution-broadening
  # signal that doesn't dominate.

  - name: wikipedia_en
    dataset_id: wikimedia/wikipedia
    hf_extra: { name: "20231101.en" }
    text_field: text
    split: train
    weight: 0.08
    filter:
      name: min_content_len
      args: { min_chars: 500 }
