# Mixed-corpus pretrain v10 — v4 mix + a long-context RECALL stream so the
# co-trained WorkingMemory (WM) has a saturating-recall gradient to learn from.
#
# WHY THE RECALL STREAM EXISTS (read before changing weights):
#   WM is a bounded buffer read at think positions. It only earns its keep when
#   the DeltaNet recurrent state SATURATES — i.e. on long-range recall where a
#   binding made many tokens earlier must be retrieved late. The v4 mix is
#   short packed docs with cross-doc isolation; on short docs WM is PROVABLY
#   redundant (the binding still fits in the recurrent state), so WM stays
#   inert no matter how it is wired. v10 adds local-JSONL recall sources
#   (bind value early → distractor lines → recall it late) at a combined
#   weight ~0.13 so every step gives WM a fraction of saturating-recall
#   gradient. This is the data-side half of the "make WM load-bearing" fix;
#   the train-time think-burst injection (think_burst_prob) supplies the think
#   tokens WM reads at.
#
# These sources stream from local JSONL (data_mix SourceConfig.jsonl_path +
# _jsonl_stream); text_field is `problem_prompt` (the program-to-run prompt
# that contains the early binding + distractors + the recall question).
#
# Weight changes vs v4 (weight: v4 -> v10). CVE streams (bigvul, cybernative)
# are KEPT — they are the drifting hard streams v4 was correcting for. The
# easy / high-volume synthetic-code streams are down-weighted to make room for
# the recall stream so the total still sums to 1.00:
#   codeparrot              0.30 -> 0.23   easy-data gradient dominance
#   python_codes_25k        0.10 -> 0.08
#   magicoder_oss           0.10 -> 0.09
#   code_exercises_jinaai   0.03 -> 0.02   low-quality synthetic
#   bigvul                  0.10 -> 0.10   (KEPT — drifting hard stream)
#   cybernative_vuln_dpo    0.05 -> 0.05   (KEPT — drifting hard stream)
#   + longctx_recall_train  0.00 -> 0.09   NEW saturating-recall gradient
#   + synthetic_memory      0.00 -> 0.04   NEW recall families (var/chain/etc.)
#   (all others unchanged)
# Sum: 0.23+0.08+0.09+0.02+0.06+0.05+0.10+0.05+0.06+0.05+0.10+0.09+0.04 = 1.02
# (renormalised by data_mix at load; the 0.02 surplus is within sampling
#  noise — weights are interpreted as relative sampling probabilities.)

sources:

  # ---- Long-context RECALL (13 % — the WM gradient) ----

  - name: longctx_recall_train
    jsonl_path: data/longctx_recall_train.jsonl
    text_field: problem_prompt
    split: train
    weight: 0.09
    filter: always

  - name: synthetic_memory
    jsonl_path: data/synthetic_memory.jsonl
    text_field: problem_prompt
    split: train
    weight: 0.04
    filter: always

  # ---- Raw code (down-weighted to make room for recall) ----

  - name: codeparrot
    dataset_id: codeparrot/codeparrot-clean
    text_field: content
    split: train
    weight: 0.23
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 200 }

  - name: python_codes_25k
    dataset_id: flytech/python-codes-25k
    text_field: text
    split: train
    weight: 0.08
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  # ---- Problem-solving instruction code ----

  - name: magicoder_oss
    dataset_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    text_field: [problem, solution]
    split: train
    weight: 0.09
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: code_exercises_jinaai
    dataset_id: jinaai/code_exercises
    text_field: [problem, solution]
    split: train
    weight: 0.02
    fim_rate: 0.5
    filter: always

  - name: python_instr_18k_alpaca
    dataset_id: iamtarun/python_code_instructions_18k_alpaca
    text_field: [prompt, output]
    split: train
    weight: 0.06
    filter: always

  - name: codealpaca_20k
    dataset_id: HuggingFaceH4/CodeAlpaca_20K
    text_field: [prompt, completion]
    split: train
    weight: 0.05
    filter: always

  # ---- CVE / vulnerability + fix (KEPT at v4 weights) ----

  - name: bigvul
    dataset_id: bstee615/bigvul
    text_builder: bigvul
    split: train
    weight: 0.10
    filter: bigvul_vulnerable

  - name: cybernative_vuln_dpo
    dataset_id: CyberNative/Code_Vulnerability_Security_DPO
    text_builder: cybernative_dpo
    split: train
    weight: 0.05
    filter: always

  # ---- Synthetic CS textbooks (unchanged) ----

  - name: textbooks_lite_sciphi
    dataset_id: SciPhi/textbooks-are-all-you-need-lite
    text_field: completion
    split: train
    weight: 0.06
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: textbook_quality_programming
    dataset_id: vikp/textbook_quality_programming
    text_field: markdown
    split: train
    weight: 0.05
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  # ---- Wikipedia (unchanged) ----

  - name: wikipedia_en
    dataset_id: wikimedia/wikipedia
    hf_extra: { name: "20231101.en" }
    text_field: text
    split: train
    weight: 0.10
    filter:
      name: min_content_len
      args: { min_chars: 500 }
