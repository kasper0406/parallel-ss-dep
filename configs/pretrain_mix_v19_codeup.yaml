# Mixed-corpus pretrain v19 — CODE-UPWEIGHTED (the data-mix lever the ablation identified).
#
# WHY v19 EXISTS: the 2026-06-20 iso-token mechanism ablation proved the
# PKM/WM/latent stack is ~FREE on code CE (codeparrot +0.018, magicoder +0.004,
# wiki -0.005 vs a lean trunk at iso-token/iso-mix). So v18's HumanEval regression
# (6/164 vs Phase-C 13/164) was NOT the mechanisms — it was MIX DILUTION: v18 cut
# codeparrot 0.30->0.22 (-27%) and spent the budget on arXiv (0.08) + heavier recall
# (0.16), starving the core general-Python source HumanEval most resembles
# (per-source CE: v18 codeparrot +0.20 WORSE than Phase C; magicoder BETTER from the
# data-hygiene fix). v19 keeps the (free) mechanisms but RESTORES code dominance.
#
# CHANGES vs v18 (weight: v18 -> v19):
#   codeparrot              0.22 -> 0.32   RESTORE + push past v4's 0.30 (the lever)
#   python_codes_25k        0.08 -> 0.11
#   magicoder_oss           0.09 -> 0.11   keep the data-hygiene win strong
#   recall streams (total)  0.16 -> 0.10   TRIM (still exercises WM, which is free
#                                          + orthogonal to HumanEval; don't over-spend)
#     multibind_recall      0.05 -> 0.03
#     code_recall_train     0.05 -> 0.03   (keeps mask_first_occurrence)
#     agentic_recall        0.03 -> 0.02
#     synthetic_memory      0.03 -> 0.02
#   arxiv_fulltext          0.06 -> 0.00   CUT  ┐ DECISION POINT — see note below
#   arxiv_abstracts         0.02 -> 0.00   CUT  ┘
#   wikipedia_en            0.04 -> 0.06
#   bigvul                  0.08 -> 0.07
#   cybernative             0.04 -> 0.03
#   (textbooks, jinaai, alpaca, codealpaca ~unchanged)
#
# ⚠ DECISION POINT (user's call): the user explicitly wanted arXiv in pretraining
#   (broader scientific/math knowledge). But the ablation + per-source CE show arXiv
#   (+ recall) dilution is exactly what cost the CODE headline. This draft CUTS arXiv
#   to maximize HumanEval; if broad knowledge matters more than the code headline,
#   re-add arXiv at ~0.04 (carve from codeparrot 0.32->0.28 + wiki). Left as a draft
#   pending that call — NOT launched.
#
# TRAIN to full Chinchilla (~5.3B tok for 287M), fresh from scratch, with the
# (free) mechanisms ON + --matrix_optimizer fused_deltanet_ns (the validated ~3%
# convergence edge). Code fraction ~0.84 (code + code-textbooks), codeparrot the
# single largest source again.

sources:

  # ==== RECALL streams (10% total — trimmed from v18's 16%; WM is free+orthogonal) ====

  - name: multibind_recall_pretrain
    jsonl_path: data/multibind_recall_pretrain.jsonl
    text_field: [problem_prompt, qwen_completion]
    split: train
    weight: 0.03
    filter: always
    emit_read_mask: true

  - name: code_recall_train
    jsonl_path: data/code_recall_train.jsonl
    text_field: [problem_prompt, qwen_completion]
    split: train
    weight: 0.03
    filter: always
    emit_read_mask: true
    mask_first_occurrence: true

  - name: agentic_recall_train
    jsonl_path: data/agentic_recall_train.jsonl
    text_field: [problem_prompt, qwen_completion]
    split: train
    weight: 0.02
    filter: always
    emit_read_mask: true
    mask_first_occurrence: true

  - name: synthetic_memory
    jsonl_path: data/synthetic_memory.jsonl
    text_field: [problem_prompt, qwen_completion]
    split: train
    weight: 0.02
    filter: always

  # ==== Raw code (the anti-forgetting bulk; codeparrot RESTORED to dominance) ====

  - name: codeparrot
    dataset_id: codeparrot/codeparrot-clean
    text_field: content
    split: train
    weight: 0.32
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 200 }

  - name: python_codes_25k
    dataset_id: flytech/python-codes-25k
    text_field: text
    split: train
    weight: 0.11
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  # ==== Problem-solving instruction code ====

  - name: magicoder_oss
    dataset_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    text_field: [problem, solution]
    split: train
    weight: 0.11
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: code_exercises_jinaai
    dataset_id: jinaai/code_exercises
    text_field: [problem, solution]
    split: train
    weight: 0.02
    fim_rate: 0.5
    filter: always

  - name: python_instr_18k_alpaca
    dataset_id: iamtarun/python_code_instructions_18k_alpaca
    text_field: [prompt, output]
    split: train
    weight: 0.06
    filter: always

  - name: codealpaca_20k
    dataset_id: HuggingFaceH4/CodeAlpaca_20K
    text_field: [prompt, completion]
    split: train
    weight: 0.04
    filter: always

  # ==== CVE / vulnerability + fix ====

  - name: bigvul
    dataset_id: bstee615/bigvul
    text_builder: bigvul
    split: train
    weight: 0.07
    filter: bigvul_vulnerable

  - name: cybernative_vuln_dpo
    dataset_id: CyberNative/Code_Vulnerability_Security_DPO
    text_builder: cybernative_dpo
    split: train
    weight: 0.03
    filter: always

  # ==== Synthetic CS textbooks ====

  - name: textbooks_lite_sciphi
    dataset_id: SciPhi/textbooks-are-all-you-need-lite
    text_field: completion
    split: train
    weight: 0.04
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: textbook_quality_programming
    dataset_id: vikp/textbook_quality_programming
    text_field: markdown
    split: train
    weight: 0.04
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  # ==== Wikipedia (prose grounding) ====

  - name: wikipedia_en
    dataset_id: wikimedia/wikipedia
    hf_extra: { name: "20231101.en" }
    text_field: text
    split: train
    weight: 0.06
    filter:
      name: min_content_len
      args: { min_chars: 500 }
