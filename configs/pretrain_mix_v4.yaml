# Mixed-corpus pretrain v4 — re-weighted mix to fix the CVE-stream drift.
#
# Persistent unsolved problem across v2 / v3a / v3b / v3-long: the hard
# CVE streams (bigvul, cybernative) drift *upward* in held-out CE as
# training proceeds, in every run. The WD fix (0.01) un-collapsed the
# residual stream but did not touch this — it is mix imbalance: the
# easy, high-volume synthetic-code streams dominate the gradient and
# the model trades the hard streams away.
#
# v4 lever (the only thing no prior run has touched): down-weight the
# easy / low-quality synthetic code (codeparrot, jinaai code_exercises)
# and up-weight the drifting hard streams (bigvul, cybernative) plus
# wikipedia for prose grounding.
#
# Changes vs v2/v3 mix (weight: old -> new):
#   codeparrot              0.37 -> 0.30   easy-data gradient dominance
#   code_exercises_jinaai   0.06 -> 0.03   low-quality synthetic
#   python_codes_25k        0.11 -> 0.10
#   bigvul                  0.05 -> 0.10   the drifting hard stream
#   cybernative_vuln_dpo    0.02 -> 0.05   the other drifting stream
#   wikipedia_en            0.08 -> 0.10   prose grounding
#   magicoder_oss           0.09 -> 0.10   keep good instruction code strong
#   (others unchanged)
#
# NOTE: magnitudes are the working draft — confirm against the
# v3-long final diag (runs/v3_long_diag.log) before launch; if bigvul
# CE drift is steeper than v2's, push bigvul/cybernative higher still.

sources:

  # ---- Raw code (40 % vs 48 % in v2) ----

  - name: codeparrot
    dataset_id: codeparrot/codeparrot-clean
    text_field: content
    split: train
    weight: 0.30
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 200 }

  - name: python_codes_25k
    dataset_id: flytech/python-codes-25k
    text_field: text
    split: train
    weight: 0.10
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  # ---- Problem-solving instruction code (24 % vs 26 %) ----

  - name: magicoder_oss
    dataset_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    text_field: [problem, solution]
    split: train
    weight: 0.10
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: code_exercises_jinaai
    dataset_id: jinaai/code_exercises
    text_field: [problem, solution]
    split: train
    weight: 0.03
    fim_rate: 0.5
    filter: always

  - name: python_instr_18k_alpaca
    dataset_id: iamtarun/python_code_instructions_18k_alpaca
    text_field: [prompt, output]
    split: train
    weight: 0.06
    filter: always

  - name: codealpaca_20k
    dataset_id: HuggingFaceH4/CodeAlpaca_20K
    text_field: [prompt, completion]
    split: train
    weight: 0.05
    filter: always

  # ---- CVE / vulnerability + fix (15 % vs 7 % in v2) ----

  - name: bigvul
    dataset_id: bstee615/bigvul
    text_builder: bigvul
    split: train
    weight: 0.10
    filter: bigvul_vulnerable

  - name: cybernative_vuln_dpo
    dataset_id: CyberNative/Code_Vulnerability_Security_DPO
    text_builder: cybernative_dpo
    split: train
    weight: 0.05
    filter: always

  # ---- Synthetic CS textbooks (11 %, unchanged) ----

  - name: textbooks_lite_sciphi
    dataset_id: SciPhi/textbooks-are-all-you-need-lite
    text_field: completion
    split: train
    weight: 0.06
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: textbook_quality_programming
    dataset_id: vikp/textbook_quality_programming
    text_field: markdown
    split: train
    weight: 0.05
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  # ---- Wikipedia (10 % vs 8 %) ----

  - name: wikipedia_en
    dataset_id: wikimedia/wikipedia
    hf_extra: { name: "20231101.en" }
    text_field: text
    split: train
    weight: 0.10
    filter:
      name: min_content_len
      args: { min_chars: 500 }
