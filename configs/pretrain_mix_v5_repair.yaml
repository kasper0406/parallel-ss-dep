# Mixed-corpus pretrain v5_repair — v4 mix + 2 % self-debug repair triples.
#
# Rationale: DeepSeek-Coder + similar models include (broken_code, error,
# fixed_code) triples in pretrain as NATURAL CODE TEXT. Models exposed to
# debugging dialogue during pretrain develop a natural debugging instinct
# that doesn't need a dedicated SFT phase to activate.
#
# We have 5247 such triples from `gen_repair_triples.py`, converted to flat
# plain text by `experiments/build_pretrain_repair_corpus.py` and stored at
# `data/pretrain_repair_corpus.jsonl` (~620 k whitespace-tokens, ~750 k BPE
# tokens). A previous SFT attempt on this format was a clean negative — it
# pushed the model OUT of its general code distribution. Folding the same
# data into pretrain at low weight (~2 %) sidesteps that: the model sees
# these as one more variety of code text without overweighting them.
#
# Weights vs v4 (v4 -> v5_repair):
#   codeparrot              0.30 -> 0.29   (-0.01)
#   code_exercises_jinaai   0.03 -> 0.02   (-0.01)
#   self_debug_triples      0.00 -> 0.02   NEW
#   (all others unchanged)
# Sum: 1.00

sources:

  # ---- Raw code (39 % vs 40 % in v4) ----

  - name: codeparrot
    dataset_id: codeparrot/codeparrot-clean
    text_field: content
    split: train
    weight: 0.29
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 200 }

  - name: python_codes_25k
    dataset_id: flytech/python-codes-25k
    text_field: text
    split: train
    weight: 0.10
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  # ---- Problem-solving instruction code (23 % vs 24 %) ----

  - name: magicoder_oss
    dataset_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    text_field: [problem, solution]
    split: train
    weight: 0.10
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: code_exercises_jinaai
    dataset_id: jinaai/code_exercises
    text_field: [problem, solution]
    split: train
    weight: 0.02
    fim_rate: 0.5
    filter: always

  - name: python_instr_18k_alpaca
    dataset_id: iamtarun/python_code_instructions_18k_alpaca
    text_field: [prompt, output]
    split: train
    weight: 0.06
    filter: always

  - name: codealpaca_20k
    dataset_id: HuggingFaceH4/CodeAlpaca_20K
    text_field: [prompt, completion]
    split: train
    weight: 0.05
    filter: always

  # ---- Self-debug triples (2 %, NEW) ----

  - name: self_debug_triples
    jsonl_path: data/pretrain_repair_corpus.jsonl
    text_field: text
    weight: 0.02
    filter: always

  # ---- CVE / vulnerability + fix (15 %, unchanged) ----

  - name: bigvul
    dataset_id: bstee615/bigvul
    text_builder: bigvul
    split: train
    weight: 0.10
    filter: bigvul_vulnerable

  - name: cybernative_vuln_dpo
    dataset_id: CyberNative/Code_Vulnerability_Security_DPO
    text_builder: cybernative_dpo
    split: train
    weight: 0.05
    filter: always

  # ---- Synthetic CS textbooks (11 %, unchanged) ----

  - name: textbooks_lite_sciphi
    dataset_id: SciPhi/textbooks-are-all-you-need-lite
    text_field: completion
    split: train
    weight: 0.06
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: textbook_quality_programming
    dataset_id: vikp/textbook_quality_programming
    text_field: markdown
    split: train
    weight: 0.05
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  # ---- Wikipedia (10 %, unchanged) ----

  - name: wikipedia_en
    dataset_id: wikimedia/wikipedia
    hf_extra: { name: "20231101.en" }
    text_field: text
    split: train
    weight: 0.10
    filter:
      name: min_content_len
      args: { min_chars: 500 }
