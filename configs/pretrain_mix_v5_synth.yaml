# Mixed-corpus pretrain v5_synth — v4 mix + 10% Phi-1-style synthetic
# (signature+docstring → body) Python functions.
#
# Rationale: our pretrain mix has 0% of HumanEval's exact format. Phi-1
# hit 50% HumanEval at 1.3B params by aggressively pretraining on
# synthetic "textbook quality" docstring → code completion. Generate
# ~50–100k such examples via Qwen (experiments/gen_synthetic_pyfunc_data.py)
# and add them as a 10% source. Other weights down-scaled proportionally
# from v4.
#
# Weights vs v4 (v4 -> v5_synth):
#   codeparrot              0.30 -> 0.27   (-0.03)
#   python_codes_25k        0.10 -> 0.09   (-0.01)
#   magicoder_oss           0.10 -> 0.09   (-0.01)
#   code_exercises_jinaai   0.03 -> 0.03
#   python_instr_18k_alpaca 0.06 -> 0.05   (-0.01)
#   codealpaca_20k          0.05 -> 0.04   (-0.01)
#   bigvul                  0.10 -> 0.09   (-0.01)
#   cybernative_vuln_dpo    0.05 -> 0.05
#   textbooks_lite_sciphi   0.06 -> 0.05   (-0.01)
#   textbook_quality_prog   0.05 -> 0.04   (-0.01)
#   wikipedia_en            0.10 -> 0.10
#   synthetic_pyfunc        0.00 -> 0.10   NEW
# (sums to 1.00)
#
# The synthetic JSONL is produced by:
#   experiments/gen_synthetic_pyfunc_data.py --n_per_topic 200 \
#       --out data/synthetic_pyfunc.jsonl
# Each row has {task_id, text, source}; `text` is the whole function.

sources:

  # ---- Raw code (36 %) ----

  - name: codeparrot
    dataset_id: codeparrot/codeparrot-clean
    text_field: content
    split: train
    weight: 0.27
    filter:
      name: min_content_len
      args: { min_chars: 200 }

  - name: python_codes_25k
    dataset_id: flytech/python-codes-25k
    text_field: text
    split: train
    weight: 0.09
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  # ---- Problem-solving instruction code (21 %) ----

  - name: magicoder_oss
    dataset_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    text_field: [problem, solution]
    split: train
    weight: 0.09
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: code_exercises_jinaai
    dataset_id: jinaai/code_exercises
    text_field: [problem, solution]
    split: train
    weight: 0.03
    filter: always

  - name: python_instr_18k_alpaca
    dataset_id: iamtarun/python_code_instructions_18k_alpaca
    text_field: [prompt, output]
    split: train
    weight: 0.05
    filter: always

  - name: codealpaca_20k
    dataset_id: HuggingFaceH4/CodeAlpaca_20K
    text_field: [prompt, completion]
    split: train
    weight: 0.04
    filter: always

  # ---- Phi-1-style synthetic Python functions (10 %, NEW) ----

  - name: synthetic_pyfunc
    jsonl_path: data/synthetic_pyfunc.jsonl
    text_field: text
    weight: 0.10
    filter: always

  # ---- CVE / vulnerability + fix (14 %) ----

  - name: bigvul
    dataset_id: bstee615/bigvul
    text_builder: bigvul
    split: train
    weight: 0.09
    filter: bigvul_vulnerable

  - name: cybernative_vuln_dpo
    dataset_id: CyberNative/Code_Vulnerability_Security_DPO
    text_builder: cybernative_dpo
    split: train
    weight: 0.05
    filter: always

  # ---- Synthetic CS textbooks (9 %) ----

  - name: textbooks_lite_sciphi
    dataset_id: SciPhi/textbooks-are-all-you-need-lite
    text_field: completion
    split: train
    weight: 0.05
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: textbook_quality_programming
    dataset_id: vikp/textbook_quality_programming
    text_field: markdown
    split: train
    weight: 0.04
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  # ---- Wikipedia (10 %) ----

  - name: wikipedia_en
    dataset_id: wikimedia/wikipedia
    hf_extra: { name: "20231101.en" }
    text_field: text
    split: train
    weight: 0.10
    filter:
      name: min_content_len
      args: { min_chars: 500 }
