# Mixed-corpus pretrain v6_all — combines every data improvement built
# in the 2026-05-25 audit:
#
#   1. FIM augmentation (fim_rate=0.5 on code sources) — addresses the
#      halt-after-docstring artifact + missing prefix↔suffix↔middle
#      pattern. CLAUDE.md task #65.
#   2. Synthetic Phi-1-style (signature+docstring → body) data at 10 %
#      — adds the HumanEval-format examples our prior mix had ZERO of.
#      REQUIRES experiments/gen_synthetic_pyfunc_data.py to be run
#      first (produces data/synthetic_pyfunc.jsonl).
#   3. Self-debug repair triples at 2 % — exposes the model to
#      (broken, error, fix) patterns during pretrain (DeepSeek-Coder
#      pattern). Built by experiments/build_pretrain_repair_corpus.py
#      from data/repair_triples_v3.jsonl.
#
# Weights re-balanced from v4 to absorb the +12 % of synth+self-debug
# while keeping CVE/wiki/textbook weights stable (they're the
# anti-forgetting / out-of-distribution sources):
#   codeparrot              0.30 -> 0.26  (still dominant code source)
#   python_codes_25k        0.10 -> 0.08
#   magicoder_oss           0.10 -> 0.08
#   code_exercises_jinaai   0.03 -> 0.02
#   python_instr_18k        0.06 -> 0.04
#   codealpaca              0.05 -> 0.04
#   synthetic_pyfunc        NEW  -> 0.10
#   self_debug_triples      NEW  -> 0.02
#   (others unchanged)
#
# Sum = 0.26+0.08+0.08+0.02+0.04+0.04+0.10+0.02 + 0.10+0.05+0.06+0.05+0.10
#     = 1.00 (verified: `grep '^    weight:' | awk '{s+=$2}END{print s}'`)

sources:

  - name: codeparrot
    dataset_id: codeparrot/codeparrot-clean
    text_field: content
    split: train
    weight: 0.26
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 200 }

  - name: python_codes_25k
    dataset_id: flytech/python-codes-25k
    text_field: text
    split: train
    weight: 0.08
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: magicoder_oss
    dataset_id: ise-uiuc/Magicoder-OSS-Instruct-75K
    text_field: [problem, solution]
    split: train
    weight: 0.08
    fim_rate: 0.5
    filter:
      name: min_content_len
      args: { min_chars: 100 }

  - name: code_exercises_jinaai
    dataset_id: jinaai/code_exercises
    text_field: [problem, solution]
    split: train
    weight: 0.02
    fim_rate: 0.5
    filter: always

  - name: python_instr_18k_alpaca
    dataset_id: iamtarun/python_code_instructions_18k_alpaca
    text_field: [prompt, output]
    split: train
    weight: 0.04
    filter: always

  - name: codealpaca_20k
    dataset_id: HuggingFaceH4/CodeAlpaca_20K
    text_field: [prompt, completion]
    split: train
    weight: 0.04
    filter: always

  # NEW: HumanEval-format synthetic (Phi-1 style)
  - name: synthetic_pyfunc
    jsonl_path: data/synthetic_pyfunc.jsonl
    text_field: text
    weight: 0.10
    filter: always

  # NEW: self-debug triples folded into pretrain at low weight
  - name: self_debug_triples
    jsonl_path: data/pretrain_repair_corpus.jsonl
    text_field: text
    weight: 0.02
    filter: always

  - name: bigvul
    dataset_id: bstee615/bigvul
    text_builder: bigvul
    split: train
    weight: 0.10
    filter: bigvul_vulnerable

  - name: cybernative_vuln_dpo
    dataset_id: CyberNative/Code_Vulnerability_Security_DPO
    text_builder: cybernative_dpo
    split: train
    weight: 0.05
    filter: always

  - name: textbooks_lite_sciphi
    dataset_id: SciPhi/textbooks-are-all-you-need-lite
    text_field: completion
    split: train
    weight: 0.06
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: textbook_quality_programming
    dataset_id: vikp/textbook_quality_programming
    text_field: markdown
    split: train
    weight: 0.05
    filter:
      name: min_content_len
      args: { min_chars: 400 }

  - name: wikipedia_en
    dataset_id: wikimedia/wikipedia
    hf_extra: { name: "20231101.en" }
    text_field: text
    split: train
    weight: 0.10
    filter:
      name: min_content_len
      args: { min_chars: 500 }
